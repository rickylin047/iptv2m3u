# IPTV M3U 播放列表生成器配置文件
#
# 使用前：cp config.example.yaml config.yaml.local，然后填入你自己机顶盒的认证信息。
# config.yaml.local（以及 config.yaml）已被 .gitignore 忽略，不会被提交。
# 加载优先级：config.yaml.local > config.yaml

# EPG 分类页 URL（每个 URL 对应一个分组）
epg_urls:
  - url: "https://epg.51zmt.top:8001/category/cctv/"
    group: "央视"
  - url: "https://epg.51zmt.top:8001/category/satellite/"
    group: "卫视"
  - url: "https://epg.51zmt.top:8001/category/digital/"
    group: "数字付费"
  - url: "https://epg.51zmt.top:8001/category/local/广东/"
    group: "广东"

# 节目单 XMLTV（写进 M3U 表头 x-tvg-url，给播放器显示 EPG 节目表 / 从节目单选节目回看）。
# 默认 51zmt 的 e.xml.gz：与上面分类页台标同源、每日更新；频道按 51zmt 频道码（写入
# tvg-id / tvg-name）绑定。注意 51zmt XMLTV 的 <channel id> 是数字序号、<display-name>
# 才是频道码（CCTV1 / 湖南卫视…），靠 display-name 匹配，所以播放器需能联网拉 EPG。
# 一般无需修改；如需自定义可取消下一行注释覆盖：
# epg_xmltv_url: "http://epg.51zmt.top:8000/e.xml.gz"

# rtp2httpd 服务地址（IGMP 转 HTTP 单播，支持 FCC 快速换台）
unicast_url: "http://192.168.50.8:5140/rtp/"

# RTSP 直播备用源的 relay 基址（同一 rtp2httpd 的 /rtsp/ 路径，TCP 单播、不依赖 IGMP/FCC）。
# 默认从 unicast_url 自动派生（把末段 rtp/ 换成 rtsp/），一般无需配置；
# 如需自定义可取消下一行注释覆盖：
# rtsp_url: "http://192.168.50.8:5140/rtsp/"

# 缓存目录
cache_dir: "cache"

# 输出目录（iStoreOS uhttpd web 根，HTTP 直接可访问）
output_dir: "/www"

# IPTV 认证配置（从你自己的机顶盒抓包获取，详见 README 的"获取认证信息"）
auth:
  # 完整 IPTV 账号 = 宽带号 @ 账号域（认证域）；如广东电信为 07623024411@iptv.gd
  # 账号域（@ 后那段，PPPoE/RADIUS 的 realm）各地区/运营商不同，按你的实际账号填
  # 代码自动取 @ 前作 UserID、用完整值作 NetUserID/DHCPUserID
  iptv_account: "YOUR_ACCOUNT@iptv.gd"
  # 机顶盒 ID
  stb_id: "YOUR_STB_ID"
  # MAC 地址
  mac: "AA:BB:CC:DD:EE:FF"
  # 认证令牌（具有时效性，过期需重新获取）
  authenticator: "YOUR_AUTHENTICATOR_TOKEN"
  # 机顶盒型号（按你的机顶盒实际型号填写）
  stb_type: "UNP-SJA5"
  # 系统版本
  stb_version: "1.1.0-UNIONMAN_UNP-SJA5.2024v1"
  # 用户令牌
  user_token: "YOUR_USER_TOKEN"
  # 是否智能机顶盒
  is_smart_stb: 0
